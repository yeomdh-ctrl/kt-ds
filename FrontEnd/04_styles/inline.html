<!doctype html>
  <head>
    <meta charset="UTF-8" />
    <title>Inline Style 실습</title>
  </head>
  <body>
    <div id="header" style="background-color: #ff0000; color: #ffffff;">
      Header 영역
      <p class="header--logo">로고 영역입니다.</p>
    </div>
    <div id="main-container">
      Main-Container 영역
      <p class="main-container--content"></p>
    </div>
    <div id="footer">
      Footer 영역
      <ul class="footer-links">
        <li class="footer-links--link">Item1</li>
        <li class="footer-links--link">Item2</li>
        <li class="footer-links--link">Item3</li>
      </ul>
    </div>
  </body>
</html>
