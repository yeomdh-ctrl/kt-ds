<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <title>Flex Item</title>
    <link rel="stylesheet" type="text/css" href="./16_flex.css" />
    <link rel="stylesheet" type="text/css" href="./16_flex_item.css" />
  </head>
  <body>
    <ul class="flex">
      <li style="flex-grow: 1">A</li>
      <li style="flex-grow: 2">B</li>
      <li style="flex-grow: 1">CCCCCCCCCCCCCCCCCCCCCCCCCCCCCC</li>
      <li style="flex-grow: 1">D</li>
    </ul>
    <ul class="flex vertical">
      <li>A</li>
      <li>B</li>
      <li>
        <p>CCCCCCCCCCCCCCCCCCCCCCCCCCCCCC</p>
        <p>CCCCCCCCCCCCCCCCCCCCCCCCCCCCCC</p>
        <p>CCCCCCCCCCCCCCCCCCCCCCCCCCCCCC</p>
        <p>CCCCCCCCCCCCCCCCCCCCCCCCCCCCCC</p>
        <p>CCCCCCCCCCCCCCCCCCCCCCCCCCCCCC</p>
        <p>CCCCCCCCCCCCCCCCCCCCCCCCCCCCCC</p>
      </li>
      <li>D</li>
    </ul>
  </body>
</html>
