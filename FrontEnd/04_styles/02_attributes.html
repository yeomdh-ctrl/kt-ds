<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
  </head>
  <body>
    <input tabindex="1" title="아이디를 입력해야 합니다." />
    <p tabindex="2">단락을 만들어주는 p 태그</p>
    <!--Unordered List-->
    <ul tabindex="3">
      <!--Lite item-->
      <li tabindex="4" accesskey="r">첫 번째 아이템</li>
      <li tabindex="6">두 번째 아이템</li>
      <li tabindex="5">세 번째 아이템</li>
    </ul>
    <!--Divide - 화면을 나누어 영역을 구분시킨다.-->
    <div>
      <p>두 번째 단락</p>
      <p>세 번째 단락</p>
    </div>
  </body>
</html>
