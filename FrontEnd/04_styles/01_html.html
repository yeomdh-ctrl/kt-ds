<!--
    현재 HTML 문서가 HTML5 표준으로 생성됨을 알려줌.
    아래 문서 타입이 정의되지 않았다면 HTML4 표준을 사용하는 것으로 판단
-->
<!doctype html>
<!-- 
HTML을 작성하는 시점: Tag
화면에 보여지는 시점: Element
DOM Tree 기준: Node

HTML 태그의 역할?
    Window를 생성하는 역할.
        Window의 이름을 지정.
        Window의 아이콘(Favicon)을 지정.
        Window의 내용을 작성.
-->
<html>
  <!-- Window의 Tab과 관련된 정보를 작성-->
  <head>
    <!--Window Tab의 이름-->
    <title>Html 생성합니다.</title>
    <link rel="icon" href="https://naver.com/favicon.ico?1" />
    <meta name="charset" content="UTF-8" />
  </head>
  <body>
    브라우저의 본문 내용입니다. ㅋㅋㅋ ㅋㅋㅋ ㅋㅋㅋㅋ
  </body>
</html>
