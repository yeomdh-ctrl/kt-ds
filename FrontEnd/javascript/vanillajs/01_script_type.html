<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Javascript 실행방법</title>
    <script type="text/javascript" src="./01_script_type.js"></script>
  </head>
  <body>
    <button class="clickable-button">Click Me!</button>
    <div class="clickable-box">Click Me!</div>
    <!-- p 태그를 클릭하면 "클릭했습니다." 라고 콘솔에 출력하기 -->
    <p onclick="console.log('클릭했습니다.')">ppppppppppp</p>
  </body>
</html>
